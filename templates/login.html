{% extends 'base.html' %}

{% block title %}Login - PredicTech{% endblock %}

{% block auth_content %}
<div class="glass-panel auth-form-card">
    <div style="font-size: 3rem; margin-bottom: 1rem;">⚙️</div>
    <h2>Welcome Back</h2>
    <p>Sign in to the Operations Console</p>
    
    <form method="POST" action="{{ url_for('login') }}">
        <div class="input-group">
            <label for="username">Operator ID</label>
            <input type="text" id="username" name="username" required placeholder="Enter your ID">
        </div>
        <div class="input-group">
            <label for="password">Security Pin</label>
            <input type="password" id="password" name="password" required placeholder="Enter your Pin">
        </div>
        <button type="submit" class="btn-primary">Authenticate</button>
    </form>
    <div class="switch-auth">
        New Operator? <a href="{{ url_for('register') }}">Request Access</a>
    </div>
</div>
{% endblock %}
